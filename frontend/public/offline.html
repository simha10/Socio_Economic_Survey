<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Socio-Economic Survey - Offline</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background-color: #0B1F33;
      color: #E5E7EB;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 500px;
      padding: 2rem;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      color: #0ea5e9;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 1rem;
      font-size: 1.5rem;
    }
    p {
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .status {
      display: inline-block;
      padding: 0.5rem 1rem;
      background-color: #374151;
      border-radius: 9999px;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📶</div>
    <h1>You are offline</h1>
    <div class="status">No Internet Connection</div>
    <p>Please check your network connection and try again. Some features may be unavailable while offline.</p>
    <p>Once you're back online, the application will reconnect automatically.</p>
  </div>
</body>
</html>
